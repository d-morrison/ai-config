name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    permissions:
      # Push the rendered site to gh-pages. Required even though this job only
      # renders: the reusable workflow's deploy job declares contents: write,
      # and a caller must grant a job's permissions even when that job runs.
      contents: write
    uses: d-morrison/gha/.github/workflows/quarto-publish.yml@v2
