name: validate

on: [push, pull_request]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install pyyaml==6.0.2
      - name: Validate skills & manifests
        run: python3 scripts/validate-skills.py
      - name: Check markdown links
        run: python3 scripts/check-links.py
      - name: Check vendored drift
        run: python3 scripts/check-vendored-drift.py
      - name: Check markdown (.md) style
        run: npx --yes markdownlint-cli2@0.22.1   # node is preinstalled on ubuntu runners; config in .markdownlint-cli2.jsonc
      - name: Check Quarto (.qmd) prose style
        uses: d-morrison/gha/lint-qmd@cba62aa00856c40111cd976d563e1ebe748f3f9a # gha#280
